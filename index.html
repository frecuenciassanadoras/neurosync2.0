<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Clínico - NeuroSync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-gradient: linear-gradient(135deg, #0a0a14 0%, #14142b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --cyan-glow: #00d4ff;
            --purple-glow: #a64bf4;
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #neuro-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 10;
            position: relative;
        }

        /* Efecto de luz detrás de la tarjeta */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(166, 75, 244, 0.15) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #34d399;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        
        .status-dot {
            width: 8px; height: 8px;
            background-color: #10b981; 
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .logo-title { font-size: 2rem; margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-title span { 
            background: linear-gradient(to right, var(--cyan-glow), var(--purple-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .input-group i.icon-left { position: absolute; left: 16px; top: 40px; color: #64748b; font-size: 0.9rem;}

        .login-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .login-input::placeholder { color: #475569; }

        .login-input:focus {
            border-color: var(--purple-glow);
            box-shadow: 0 0 15px rgba(166, 75, 244, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .input-group i.icon-right {
            position: absolute;
            right: 16px;
            top: 40px;
            color: #64748b;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .input-group i.icon-right:hover { color: #e2e8f0; }

        .btn-login {
            background: linear-gradient(135deg, #0284c7 0%, #a64bf4 100%);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 5px 20px rgba(166, 75, 244, 0.4);
            letter-spacing: 1px;
        }

        .btn-login:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(166, 75, 244, 0.6);
        }

        .message-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            font-weight: 500;
        }

        .msg-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
        .msg-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; }

        /* ESTILOS PARA BOTONES DE SOPORTE Y COMPRA */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 20px 0;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }
        .divider span { padding: 0 15px; text-transform: uppercase; letter-spacing: 1px;}
        
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .btn-hotmart {
            background-color: rgba(225, 75, 29, 0.1);
            color: #ff7551; 
            border: 1px solid rgba(225, 75, 29, 0.3);
        }
        .btn-hotmart:hover {
            background-color: rgba(225, 75, 29, 0.2);
            box-shadow: 0 5px 15px rgba(225, 75, 29, 0.2);
        }
        
        .btn-whatsapp {
            background-color: rgba(37, 211, 102, 0.1);
            color: #4ade80;
            border: 1px solid rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:hover {
            background-color: rgba(37, 211, 102, 0.2);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="neuro-canvas"></canvas>

    <div class="login-card">
        <div class="status-indicator">
            <div class="status-dot"></div>
            Sistema NeuroSync Activo
        </div>

        <h1 class="logo-title">NEURO<span>SYNC</span></h1>
        <p class="subtitle">Autenticación de Protocolo</p>

        <form id="login-form">
            <div class="input-group">
                <label class="input-label">Email de Usuario</label>
                <i class="fas fa-envelope icon-left"></i>
                <input type="email" id="email" class="login-input" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label class="input-label">Clave de Acceso</label>
                <i class="fas fa-lock icon-left"></i>
                <input type="password" id="password" class="login-input" placeholder="••••••••" required>
                <!-- Botón de ojito agregado para revelar contraseña -->
                <i class="fas fa-eye icon-right" id="toggle-password" title="Mostrar/Ocultar contraseña"></i>
            </div>

            <button type="submit" class="btn-login" id="btn-submit">INGRESAR AL PANEL</button>
        </form>

        <div id="message-container" class="message-box"></div>

        <div class="divider"><span>¿Aún no tienes acceso?</span></div>
        
        <a href="https://pay.hotmart.com/U104728533E" target="_blank" class="btn-action btn-hotmart">
            <i class="fas fa-bolt"></i> Adquirir Frecuencias NeuroSync
        </a>
        
        <a href="https://wa.link/3yc8pr" target="_blank" class="btn-action btn-whatsapp">
            <i class="fab fa-whatsapp" style="font-size: 1.1rem;"></i> Soporte por WhatsApp
        </a>
    </div>

    <script>
        // LÓGICA MOSTRAR/OCULTAR CONTRASEÑA
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function (e) {
            // Alterna el tipo de input entre 'password' y 'text'
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Cambia el ícono
            this.classList.toggle('fa-eye-slash');
        });

        // LÓGICA DE ACCESO (Vía Netlify Functions - Mantenida como solicitó el usuario)
        const loginForm = document.getElementById('login-form');
        const msgBox = document.getElementById('message-container');
        const btnSubmit = document.getElementById('btn-submit');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailValue = document.getElementById('email').value.trim();
            const passValue = document.getElementById('password').value.trim();

            btnSubmit.disabled = true;
            btnSubmit.style.opacity = '0.7';
            try {
                // LLAMAMOS AL TÚNEL DE NETLIFY (Conectado ahora a tu Supabase NeuroSync real)
                const response = await fetch('/.netlify/functions/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue, password: passValue })
                });

                const result = await response.json();

                if (response.ok) {
                    msgBox.innerHTML = '<i class="fas fa-check-circle"></i> Acceso concedido. Sincronizando...';
                    msgBox.className = 'message-box msg-success';
                    msgBox.style.display = 'block';
                    
                    // Guardamos la sesión local para nombre de usuario
                    localStorage.setItem("neurosync_user_email", emailValue);

                    setTimeout(() => { 
                        window.location.href = "sincronizador.html"; 
                    }, 1200);
                } else {
                    msgBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (result.message || 'Credenciales inválidas.');
                    msgBox.className = 'message-box msg-error';
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                console.error("Error:", err);
                msgBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de red. Intente de nuevo.';
                msgBox.className = 'message-box msg-error';
                msgBox.style.display = 'block';
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.style.opacity = '1';
            }
        });

        // ANIMACIÓN DE NEURONAS DIGITALES (Fondo mejorado)
        const canvas = document.getElementById('neuro-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    r: Math.random() * 1.5 + 0.5,
                    color: Math.random() > 0.5 ? '#00d4ff' : '#a64bf4'
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.shadowBlur = 0; // reset for lines

                for(let j = i+1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        const alpha = 0.2 - dist/600;
                        // Mezcla el color de las líneas
                        ctx.strokeStyle = `rgba(166, 75, 244, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
